# AirGradient ONE - Board v9
# https://www.airgradient.com/open-airgradient/instructions/overview/
#
# This configuration targets the "Made for ESPHome" program:
# https://esphome.io/guides/made_for_esphome/
#
# Release workflow:
#   - Update `esphome.project.version` below.
#   - Tag the commit as `airgradient-one/v<version>` (the slug before /v
#     must match the filename / devices.yaml slug).
#   - CI validates, builds, publishes the manifest under /airgradient-one/
#     on GitHub Pages, and attaches binaries to a GitHub Release.

esphome:
  name: "airgradient-one"
  friendly_name: "AirGradient ONE"
  name_add_mac_suffix: true
  # `project.name` must be globally unique and stable: devices keyed on it
  # for update checks and Home Assistant adoption. Use reverse-domain +
  # the device slug so multiple products from the same org don't collide.
  project:
    name: "luukvisser.airgradient-one"
    version: "1.0.0"

logger:

api:

ota:
  - platform: esphome
    id: ota_esphome

  - platform: http_request
    id: ota_http_request

http_request:
  id: http_request_client
  verify_ssl: true
  timeout: 10s
  buffer_size_rx: 2048

update:
  - platform: http_request
    id: firmware_update
    name: "Firmware Update"
    # Per-device manifest URL. Must match the Pages path the release
    # workflow publishes to (site/<slug>/manifest.json).
    source: "https://luukvisser.github.io/airgradient-esphome/airgradient-one/manifest.json"
    update_interval: 6h
    web_server:
      sorting_group_id: grp_system

wifi:
  id: wifi_client
  fast_connect: false

  ap:
    ap_timeout: 90s
    password: "cleanair"

captive_portal:
  id: captive_portal_web

esp32_improv:
  id: improv_ble
  authorizer: none

improv_serial:
  id: improv_serial_provisioner

web_server:
  id: web_server
  version: 3
  port: 80
  sorting_groups:
    - id: grp_sensors
      name: "Sensors"
      sorting_weight: 5
    - id: grp_led
      name: "LED"
      sorting_weight: 10
    - id: grp_display
      name: "Display"
      sorting_weight: 20
    - id: grp_co2
      name: "CO₂ (SenseAir S8)"
      sorting_weight: 30
    - id: grp_pm25
      name: "PM2.5 (PMS5003)"
      sorting_weight: 40
    - id: grp_temp
      name: "Temperature & Humidity (SHT40)"
      sorting_weight: 50
    - id: grp_voc
      name: "VOC / NOx (SGP41)"
      sorting_weight: 60
    - id: grp_system
      name: "System"
      sorting_weight: 70

dashboard_import:
  # Per-device import URL. The @main ref means users always adopt the
  # latest version of the config from the default branch; switch to a
  # tag (e.g. @airgradient-one/v1.0.0) if you want adoption pinned.
  package_import_url: "github://luukvisser/airgradient-esphome/airgradient-one.yaml@main"
  import_full_config: false

button:
  - platform: safe_mode
    id: safe_mode_button
    name: "Safe Mode Boot"
    entity_category: diagnostic
    web_server:
      sorting_group_id: grp_system

packages:
  board: !include packages/airgradient_esp32-c3_board.yaml
  captive_portal: !include packages/captive_portal.yaml
  pm_2.5: !include packages/sensor_pms5003_extended_life.yaml
  co2: !include packages/sensor_s8.yaml
  temp_humidity: !include packages/sensor_sht40.yaml
  tvoc: !include packages/sensor_sgp41.yaml
  display: !include packages/display_sh1106_multi_page.yaml
  led: !include packages/led.yaml
  # led_co2: !include packages/led_co2.yaml
  led_combo: !include packages/led_combo.yaml
  airgradient_api: !include packages/airgradient_api_esp32-c3.yaml
  hardware_watchdog: !include packages/watchdog.yaml
  config_button: !include packages/config_button.yaml
  wifi: !include packages/sensor_wifi.yaml
  uptime: !include packages/sensor_uptime.yaml

binary_sensor:
  - id: !extend config_button
    pin:
      ignore_strapping_warning: true  # Acknowledging that this is a strapping pin and should not have external pullup/down resistors  https://esphome.io/guides/faq.html#why-am-i-getting-a-warning-about-strapping-pins
